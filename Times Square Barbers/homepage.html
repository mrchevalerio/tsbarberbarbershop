<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Times Square Barbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #C8102E;
      --black: #0a0a0a;
      --ink: #151515;
      --smoke: #eeeeee;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --faint: rgba(255, 255, 255, 0.12);
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      --serif: "Playfair Display", Georgia, serif;
      --body: "Barlow", Arial, sans-serif;
      --label: "Barlow Condensed", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--black);
    }

    body {
      margin: 0;
      color: var(--white);
      font-family: var(--body);
      font-weight: 300;
      background: var(--black);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button, a { -webkit-tap-highlight-color: transparent; }

    .nav {
      position: fixed;
      inset: 0 0 auto;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px clamp(18px, 5vw, 68px) 34px;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.52) 48%, rgba(10, 10, 10, 0));
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 205;
    }

    .mark {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.04);
      transform: rotate(45deg);
    }

    .mark span {
      color: var(--red);
      font: 900 21px/1 var(--serif);
      transform: rotate(-45deg);
    }

    .brand-name {
      font-family: var(--label);
      font-size: 1.04rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .nav-toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .hamburger {
      position: relative;
      z-index: 205;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: grid;
      place-items: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
    }

    .hamburger span,
    .hamburger span::before,
    .hamburger span::after {
      content: "";
      display: block;
      width: 20px;
      height: 2px;
      background: var(--white);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .hamburger span::before { transform: translateY(-7px); }
    .hamburger span::after { transform: translateY(5px); }

    .nav-toggle:checked + .hamburger span { transform: rotate(45deg); }
    .nav-toggle:checked + .hamburger span::before { transform: rotate(90deg); }
    .nav-toggle:checked + .hamburger span::after { opacity: 0; }

    .menu {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 190;
      width: min(320px, 86vw);
      min-height: 100svh;
      padding: 110px 32px 32px;
      display: grid;
      align-content: start;
      gap: 22px;
      background: rgba(10, 10, 10, 0.96);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      transform: translateX(100%);
      transition: transform 0.35s ease;
      box-shadow: -30px 0 80px rgba(0, 0, 0, 0.44);
    }

    .nav-toggle:checked ~ .menu { transform: translateX(0); }

    .menu a {
      font-family: var(--label);
      font-size: 1.25rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.84);
    }

    .lang-switch {
      position: relative;
      z-index: 205;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
      margin-right: 12px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
    }

    .lang-btn {
      border: 0;
      padding: 7px 10px;
      color: rgba(255, 255, 255, 0.7);
      background: transparent;
      cursor: pointer;
      font-family: var(--label);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .lang-btn.is-active {
      color: var(--white);
      background: var(--red);
    }

    .hero {
      position: relative;
      z-index: 0;
      min-height: 100svh;
      display: grid;
      align-items: center;
      padding: 118px clamp(24px, 6vw, 84px) 48px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 73% 38%, rgba(200, 16, 46, 0.28), transparent 28%),
        radial-gradient(circle at 22% 14%, rgba(255, 255, 255, 0.07), transparent 24%),
        linear-gradient(180deg, rgba(10, 10, 10, 0.18) 0%, rgba(10, 10, 10, 0.52) 58%, rgba(0, 0, 0, 0.94) 100%),
        linear-gradient(135deg, #0b0b0b 0%, #121212 48%, #050505 100%);
    }

    .hero::before {
      content: "";
